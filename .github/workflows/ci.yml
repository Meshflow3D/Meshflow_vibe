name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  changelog:
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    runs-on: macos-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if CHANGELOG.md was modified
        id: check
        run: |
          changed=$(git diff --name-only origin/${{ github.base_ref }} HEAD | grep -c CHANGELOG.md || true)
          if [ "$changed" -gt 0 ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Fail if CHANGELOG.md was not modified
        if: steps.check.outputs.changed != 'true' && !contains(github.event.pull_request.labels.*.name, 'skip-changelog')
        run: |
          echo "::error::CHANGELOG.md must be modified in this PR."
          exit 1

  format:
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    needs: [changelog]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          prefix-key: ${{ github.ref }}
          restore-keys: |
            ${{ runner.os }}-cargo-
            ${{ runner.os }}-

      - name: Run format check
        run: cargo fmt --all -- --check

  clippy:
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    needs: [changelog, format]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          prefix-key: ${{ github.ref }}
          restore-keys: |
            ${{ runner.os }}-cargo-
            ${{ runner.os }}-

      - name: Run clippy
        run: cargo clippy --workspace --all-targets

  doctests:
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    needs: [changelog, format, clippy]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          prefix-key: ${{ github.ref }}
          restore-keys: |
            ${{ runner.os }}-cargo-
            ${{ runner.os }}-

      - name: Run doctests
        run: cargo test --workspace --doc

  test:
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    needs: [changelog, format, clippy, doctests]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          prefix-key: ${{ github.ref }}
          restore-keys: |
            ${{ runner.os }}-cargo-
            ${{ runner.os }}-

      - name: Run tests
        run: cargo test --workspace --all-targets
